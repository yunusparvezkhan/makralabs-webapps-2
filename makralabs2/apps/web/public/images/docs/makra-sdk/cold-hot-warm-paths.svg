<svg xmlns="http://www.w3.org/2000/svg" width="820" height="440" viewBox="0 0 820 440" role="img" aria-labelledby="title desc">
  <title id="title">Cold, hot, and warm Makra paths</title>
  <desc id="desc">Three clean lanes compare the first learning path, the cached reuse path, and the incremental update path.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="3" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.4" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
    <style>
      .box { stroke-width: 2.1; stroke-linejoin: round; filter: url(#shadow); }
      .yellow { fill: #fff2cc; stroke: #b9a13b; }
      .green { fill: #d5e8d4; stroke: #6f984e; }
      .blue { fill: #dae8fc; stroke: #6c7fb8; }
      .red { fill: #f8cecc; stroke: #a35b52; }
      .purple { fill: #e1d5e7; stroke: #7f6592; }
      .arrow { fill: none; stroke: #555; stroke-width: 2.2; stroke-linecap: round; marker-end: url(#arrow); }
      .rule { stroke: #d1d5db; stroke-width: 1.4; stroke-dasharray: 6 8; }
      .lane { font: 800 17px "Open Sans", Helvetica, Arial, sans-serif; fill: #1f2937; }
      .small { font: 700 12px "Open Sans", Helvetica, Arial, sans-serif; fill: #4b5563; }
      .label { font: 800 15px "Open Sans", Helvetica, Arial, sans-serif; fill: #1f2937; }
    </style>
  </defs>
  <rect width="820" height="440" fill="#fff"/>
  <line class="rule" x1="42" y1="150" x2="778" y2="150"/>
  <line class="rule" x1="42" y1="286" x2="778" y2="286"/>

  <text class="lane" x="60" y="72">Cold path</text>
  <text class="small" x="60" y="93">first template visit</text>
  <path class="box yellow" d="M184 52 C225 48 272 49 312 52 C316 70 315 96 312 113 C271 118 225 115 184 113 C180 94 182 70 184 52 Z"/>
  <text class="label" x="248" y="84" text-anchor="middle">Render DOM</text>
  <path class="box red" d="M365 52 C406 48 453 49 493 52 C497 70 496 96 493 113 C452 118 406 115 365 113 C361 94 363 70 365 52 Z"/>
  <text class="label" x="429" y="76" text-anchor="middle">LLM learn</text>
  <text class="small" x="429" y="96" text-anchor="middle">3 calls</text>
  <path class="box green" d="M546 52 C587 48 634 49 674 52 C678 70 677 96 674 113 C633 118 587 115 546 113 C542 94 544 70 546 52 Z"/>
  <text class="label" x="610" y="76" text-anchor="middle">Store schema</text>
  <text class="small" x="610" y="96" text-anchor="middle">then extract</text>

  <text class="lane" x="60" y="208">Hot path</text>
  <text class="small" x="60" y="229">schema validates</text>
  <path class="box purple" d="M184 188 C225 184 272 185 312 188 C316 206 315 232 312 249 C271 254 225 251 184 249 C180 230 182 206 184 188 Z"/>
  <text class="label" x="248" y="220" text-anchor="middle">Retrieve</text>
  <path class="box green" d="M365 188 C406 184 453 185 493 188 C497 206 496 232 493 249 C452 254 406 251 365 249 C361 230 363 206 365 188 Z"/>
  <text class="label" x="429" y="220" text-anchor="middle">Validate</text>
  <path class="box blue" d="M546 188 C587 184 634 185 674 188 C678 206 677 232 674 249 C633 254 587 251 546 249 C542 230 544 206 546 188 Z"/>
  <text class="label" x="610" y="212" text-anchor="middle">Extract</text>
  <text class="small" x="610" y="232" text-anchor="middle">0 LLM calls</text>

  <text class="lane" x="60" y="344">Warm path</text>
  <text class="small" x="60" y="365">page gained fields</text>
  <path class="box purple" d="M184 324 C225 320 272 321 312 324 C316 342 315 368 312 385 C271 390 225 387 184 385 C180 366 182 342 184 324 Z"/>
  <text class="label" x="248" y="356" text-anchor="middle">Retrieve</text>
  <path class="box yellow" d="M365 324 C406 320 453 321 493 324 C497 342 496 368 493 385 C452 390 406 387 365 385 C361 366 363 342 365 324 Z"/>
  <text class="label" x="429" y="348" text-anchor="middle">Find changes</text>
  <text class="small" x="429" y="368" text-anchor="middle">new selectors</text>
  <path class="box red" d="M546 324 C587 320 634 321 674 324 C678 342 677 368 674 385 C633 390 587 387 546 385 C542 366 544 342 546 324 Z"/>
  <text class="label" x="610" y="348" text-anchor="middle">Annotate delta</text>
  <text class="small" x="610" y="368" text-anchor="middle">then merge</text>

  <path class="arrow" d="M315 83 C330 83 347 83 362 83"/>
  <path class="arrow" d="M496 83 C511 83 528 83 543 83"/>
  <path class="arrow" d="M315 219 C330 219 347 219 362 219"/>
  <path class="arrow" d="M496 219 C511 219 528 219 543 219"/>
  <path class="arrow" d="M315 355 C330 355 347 355 362 355"/>
  <path class="arrow" d="M496 355 C511 355 528 355 543 355"/>
</svg>
