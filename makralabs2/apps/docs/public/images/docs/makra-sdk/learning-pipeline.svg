<svg xmlns="http://www.w3.org/2000/svg" width="820" height="360" viewBox="0 0 820 360" role="img" aria-labelledby="title desc">
  <title id="title">Makra learning pipeline</title>
  <desc id="desc">The first page visit is rendered, simplified into a skeleton, annotated by agents, converted into a PageSchema, and stored.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="3" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.4" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
    <style>
      .box { stroke-width: 2.2; stroke-linejoin: round; filter: url(#shadow); }
      .yellow { fill: #fff2cc; stroke: #b9a13b; }
      .green { fill: #d5e8d4; stroke: #6f984e; }
      .blue { fill: #dae8fc; stroke: #6c7fb8; }
      .red { fill: #f8cecc; stroke: #a35b52; }
      .purple { fill: #e1d5e7; stroke: #7f6592; }
      .arrow { fill: none; stroke: #555; stroke-width: 2.3; stroke-linecap: round; marker-end: url(#arrow); }
      .label { font: 800 16px "Open Sans", Helvetica, Arial, sans-serif; fill: #1f2937; }
      .small { font: 700 12px "Open Sans", Helvetica, Arial, sans-serif; fill: #4b5563; }
    </style>
  </defs>
  <rect width="820" height="360" fill="#fff"/>

  <path class="box yellow" d="M42 70 C90 66 145 67 190 70 C194 91 193 119 190 138 C145 143 91 140 42 138 C38 117 40 90 42 70 Z"/>
  <text class="label" x="116" y="103" text-anchor="middle">URL</text>
  <text class="small" x="116" y="123" text-anchor="middle">first visit</text>

  <path class="box blue" d="M247 70 C295 66 350 67 395 70 C399 91 398 119 395 138 C350 143 296 140 247 138 C243 117 245 90 247 70 Z"/>
  <text class="label" x="321" y="103" text-anchor="middle">Render DOM</text>
  <text class="small" x="321" y="123" text-anchor="middle">browser + JS</text>

  <path class="box purple" d="M452 70 C500 66 555 67 600 70 C604 91 603 119 600 138 C555 143 501 140 452 138 C448 117 450 90 452 70 Z"/>
  <text class="label" x="526" y="103" text-anchor="middle">Skeleton</text>
  <text class="small" x="526" y="123" text-anchor="middle">clean tree</text>

  <path class="box red" d="M247 214 C311 210 398 211 462 215 C466 236 465 264 462 284 C397 289 312 286 247 284 C243 263 245 235 247 214 Z"/>
  <text class="label" x="354" y="241" text-anchor="middle">LLM annotation</text>
  <text class="small" x="354" y="262" text-anchor="middle">summary, model, node labels</text>

  <path class="box green" d="M516 214 C568 210 631 211 682 215 C686 236 685 264 682 284 C630 289 569 286 516 284 C512 263 514 235 516 214 Z"/>
  <text class="label" x="599" y="246" text-anchor="middle">PageSchema</text>
  <text class="small" x="599" y="266" text-anchor="middle">selector templates</text>

  <path class="box green" d="M42 214 C94 210 157 211 208 215 C212 236 211 264 208 284 C156 289 95 286 42 284 C38 263 40 235 42 214 Z"/>
  <text class="label" x="125" y="246" text-anchor="middle">Vector store</text>
  <text class="small" x="125" y="266" text-anchor="middle">ready for reuse</text>

  <path class="arrow" d="M193 104 C207 104 230 104 244 104"/>
  <path class="arrow" d="M398 104 C412 104 435 104 449 104"/>
  <path class="arrow" d="M526 141 C501 176 442 199 405 212"/>
  <path class="arrow" d="M465 250 C480 250 499 250 513 250"/>
  <path class="arrow" d="M516 250 C415 305 276 306 211 257"/>
</svg>
