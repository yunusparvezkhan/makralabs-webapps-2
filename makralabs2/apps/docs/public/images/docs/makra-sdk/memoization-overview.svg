<svg xmlns="http://www.w3.org/2000/svg" width="820" height="420" viewBox="0 0 820 420" role="img" aria-labelledby="title desc">
  <title id="title">Makra memoization overview</title>
  <desc id="desc">First visits learn a PageSchema. Later visits reuse it to read the DOM directly and return JSON.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="3" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.4" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
    <style>
      .box { stroke-width: 2.2; stroke-linejoin: round; filter: url(#shadow); }
      .yellow { fill: #fff2cc; stroke: #b9a13b; }
      .green { fill: #d5e8d4; stroke: #6f984e; }
      .blue { fill: #dae8fc; stroke: #6c7fb8; }
      .red { fill: #f8cecc; stroke: #a35b52; }
      .purple { fill: #e1d5e7; stroke: #7f6592; }
      .arrow { fill: none; stroke: #555; stroke-width: 2.3; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .lane { font: 800 16px "Open Sans", Helvetica, Arial, sans-serif; fill: #2b2b2b; }
      .label { font: 800 17px "Open Sans", Helvetica, Arial, sans-serif; fill: #1f2937; }
      .small { font: 700 12px "Open Sans", Helvetica, Arial, sans-serif; fill: #4b5563; }
    </style>
  </defs>
  <rect width="820" height="420" fill="#fff"/>

  <text class="lane" x="70" y="96">First visit</text>
  <path class="box yellow" d="M170 58 C222 54 282 56 330 59 C334 79 333 107 330 126 C282 131 223 128 170 126 C166 105 168 78 170 58 Z"/>
  <text class="label" x="250" y="90" text-anchor="middle">New page</text>
  <text class="small" x="250" y="110" text-anchor="middle">unknown structure</text>

  <path class="box red" d="M405 58 C459 54 520 56 570 59 C574 79 573 107 570 126 C520 131 459 128 405 126 C401 105 403 78 405 58 Z"/>
  <text class="label" x="488" y="90" text-anchor="middle">Learn structure</text>
  <text class="small" x="488" y="110" text-anchor="middle">LLM annotation</text>

  <path class="box green" d="M642 58 C692 54 752 56 800 59 C804 79 803 107 800 126 C751 131 693 128 642 126 C638 105 640 78 642 58 Z"/>
  <text class="label" x="721" y="90" text-anchor="middle">PageSchema</text>
  <text class="small" x="721" y="110" text-anchor="middle">stored once</text>

  <text class="lane" x="70" y="260">Later visits</text>
  <path class="box yellow" d="M170 222 C222 218 282 220 330 223 C334 243 333 271 330 290 C282 295 223 292 170 290 C166 269 168 242 170 222 Z"/>
  <text class="label" x="250" y="254" text-anchor="middle">Similar page</text>
  <text class="small" x="250" y="274" text-anchor="middle">same template</text>

  <path class="box purple" d="M405 222 C459 218 520 220 570 223 C574 243 573 271 570 290 C520 295 459 292 405 290 C401 269 403 242 405 222 Z"/>
  <text class="label" x="488" y="254" text-anchor="middle">Reuse schema</text>
  <text class="small" x="488" y="274" text-anchor="middle">semantic lookup</text>

  <path class="box blue" d="M642 222 C692 218 752 220 800 223 C804 243 803 271 800 290 C751 295 693 292 642 290 C638 269 640 242 642 222 Z"/>
  <text class="label" x="721" y="254" text-anchor="middle">Read DOM</text>
  <text class="small" x="721" y="274" text-anchor="middle">return JSON</text>

  <path class="arrow" d="M333 92 C354 92 381 92 402 92"/>
  <path class="arrow" d="M573 92 C594 92 618 92 639 92"/>
  <path class="arrow" d="M333 256 C354 256 381 256 402 256"/>
  <path class="arrow" d="M573 256 C594 256 618 256 639 256"/>
  <path class="arrow" d="M721 129 C721 160 690 186 565 221"/>
  <text class="small" x="666" y="178" text-anchor="middle">cached knowledge</text>
</svg>
