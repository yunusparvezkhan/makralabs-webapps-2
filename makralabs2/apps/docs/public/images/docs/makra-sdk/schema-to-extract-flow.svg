<svg xmlns="http://www.w3.org/2000/svg" width="820" height="360" viewBox="0 0 820 360" role="img" aria-labelledby="title desc">
  <title id="title">Schema API to extract API flow</title>
  <desc id="desc">Use schema to discover all page fields, choose the relevant subset, then call extract to get structured JSON.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="3" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.4" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
    <style>
      .box { stroke-width: 2.2; stroke-linejoin: round; filter: url(#shadow); }
      .yellow { fill: #fff2cc; stroke: #b9a13b; }
      .green { fill: #d5e8d4; stroke: #6f984e; }
      .blue { fill: #dae8fc; stroke: #6c7fb8; }
      .purple { fill: #e1d5e7; stroke: #7f6592; }
      .arrow { fill: none; stroke: #555; stroke-width: 2.3; stroke-linecap: round; marker-end: url(#arrow); }
      .label { font: 800 16px "Open Sans", Helvetica, Arial, sans-serif; fill: #1f2937; }
      .small { font: 700 12px "Open Sans", Helvetica, Arial, sans-serif; fill: #4b5563; }
    </style>
  </defs>
  <rect width="820" height="360" fill="#fff"/>

  <path class="box yellow" d="M46 66 C94 62 149 63 194 66 C198 87 197 115 194 134 C149 139 95 136 46 134 C42 113 44 86 46 66 Z"/>
  <text class="label" x="120" y="98" text-anchor="middle">Unknown URL</text>
  <text class="small" x="120" y="118" text-anchor="middle">what data exists?</text>

  <path class="box green" d="M256 66 C304 62 359 63 404 66 C408 87 407 115 404 134 C359 139 305 136 256 134 C252 113 254 86 256 66 Z"/>
  <text class="label" x="330" y="98" text-anchor="middle">schema()</text>
  <text class="small" x="330" y="118" text-anchor="middle">discover fields</text>

  <path class="box blue" d="M466 48 C520 44 586 45 638 49 C642 76 641 125 638 152 C584 158 521 155 466 152 C462 124 464 76 466 48 Z"/>
  <text class="label" x="552" y="79" text-anchor="middle">Full JSON Schema</text>
  <line x1="502" y1="103" x2="604" y2="103" stroke="#6c7fb8" stroke-width="2" stroke-linecap="round"/>
  <line x1="502" y1="123" x2="620" y2="123" stroke="#6c7fb8" stroke-width="2" stroke-linecap="round"/>

  <path class="box purple" d="M466 214 C520 210 586 211 638 215 C642 236 641 264 638 284 C584 289 521 286 466 284 C462 263 464 235 466 214 Z"/>
  <text class="label" x="552" y="246" text-anchor="middle">Choose fields</text>
  <text class="small" x="552" y="266" text-anchor="middle">trim to the task</text>

  <path class="box yellow" d="M256 214 C304 210 359 211 404 214 C408 235 407 263 404 282 C359 287 305 284 256 282 C252 261 254 234 256 214 Z"/>
  <text class="label" x="330" y="246" text-anchor="middle">Focused schema</text>
  <text class="small" x="330" y="266" text-anchor="middle">only requested data</text>

  <path class="box green" d="M46 214 C94 210 149 211 194 214 C198 235 197 263 194 282 C149 287 95 284 46 282 C42 261 44 234 46 214 Z"/>
  <text class="label" x="120" y="246" text-anchor="middle">extract()</text>
  <text class="small" x="120" y="266" text-anchor="middle">read live DOM</text>

  <path class="box blue" d="M46 306 C94 302 149 303 194 306 C198 326 197 346 194 354 C149 359 95 356 46 354 C42 344 44 326 46 306 Z"/>
  <text class="label" x="120" y="338" text-anchor="middle">JSON result</text>

  <path class="arrow" d="M197 100 C212 100 238 100 253 100"/>
  <path class="arrow" d="M407 100 C422 100 448 100 463 100"/>
  <path class="arrow" d="M552 155 C552 174 552 193 552 211"/>
  <path class="arrow" d="M463 249 C448 249 423 249 407 249"/>
  <path class="arrow" d="M253 249 C238 249 212 249 197 249"/>
  <path class="arrow" d="M120 285 C120 292 120 299 120 303"/>
</svg>
