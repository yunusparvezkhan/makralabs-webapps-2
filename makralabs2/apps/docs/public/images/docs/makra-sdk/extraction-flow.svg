<svg xmlns="http://www.w3.org/2000/svg" width="820" height="360" viewBox="0 0 820 360" role="img" aria-labelledby="title desc">
  <title id="title">Makra cached extraction flow</title>
  <desc id="desc">For a cached page template, Makra renders the DOM and retrieves the schema, validates it, matches requested fields, extracts with selectors, and returns JSON.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="3" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.4" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
    <style>
      .box { stroke-width: 2.2; stroke-linejoin: round; filter: url(#shadow); }
      .yellow { fill: #fff2cc; stroke: #b9a13b; }
      .green { fill: #d5e8d4; stroke: #6f984e; }
      .blue { fill: #dae8fc; stroke: #6c7fb8; }
      .purple { fill: #e1d5e7; stroke: #7f6592; }
      .arrow { fill: none; stroke: #555; stroke-width: 2.3; stroke-linecap: round; marker-end: url(#arrow); }
      .label { font: 800 15px "Open Sans", Helvetica, Arial, sans-serif; fill: #1f2937; }
      .small { font: 700 12px "Open Sans", Helvetica, Arial, sans-serif; fill: #4b5563; }
      .note { font: 800 13px "Open Sans", Helvetica, Arial, sans-serif; fill: #41743a; }
    </style>
  </defs>
  <rect width="820" height="360" fill="#fff"/>

  <path class="box yellow" d="M44 142 C94 138 153 139 201 142 C205 162 204 190 201 209 C152 214 95 211 44 209 C40 188 42 161 44 142 Z"/>
  <text class="label" x="123" y="174" text-anchor="middle">Extract request</text>
  <text class="small" x="123" y="194" text-anchor="middle">URL + schema</text>

  <path class="box blue" d="M264 70 C312 66 367 67 412 70 C416 90 415 117 412 136 C366 141 313 138 264 136 C260 116 262 90 264 70 Z"/>
  <text class="label" x="338" y="101" text-anchor="middle">Render DOM</text>
  <text class="small" x="338" y="121" text-anchor="middle">live page</text>

  <path class="box purple" d="M264 214 C312 210 367 211 412 214 C416 234 415 261 412 280 C366 285 313 282 264 280 C260 260 262 234 264 214 Z"/>
  <text class="label" x="338" y="245" text-anchor="middle">Retrieve schema</text>
  <text class="small" x="338" y="265" text-anchor="middle">from cache</text>

  <path class="box green" d="M474 142 C522 138 577 139 622 142 C626 162 625 190 622 209 C576 214 523 211 474 209 C470 188 472 161 474 142 Z"/>
  <text class="label" x="548" y="174" text-anchor="middle">Validate</text>
  <text class="small" x="548" y="194" text-anchor="middle">schema covers DOM</text>

  <path class="box purple" d="M474 252 C522 248 577 249 622 252 C626 272 625 299 622 318 C576 323 523 320 474 318 C470 298 472 272 474 252 Z"/>
  <text class="label" x="548" y="283" text-anchor="middle">Match fields</text>
  <text class="small" x="548" y="303" text-anchor="middle">semantic search</text>

  <path class="box blue" d="M670 142 C715 138 765 139 808 142 C812 162 811 190 808 209 C764 214 716 211 670 209 C666 188 668 161 670 142 Z"/>
  <text class="label" x="739" y="174" text-anchor="middle">Read selectors</text>
  <text class="small" x="739" y="194" text-anchor="middle">browser JS</text>

  <path class="box yellow" d="M670 252 C715 248 765 249 808 252 C812 272 811 299 808 318 C764 323 716 320 670 318 C666 298 668 272 670 252 Z"/>
  <text class="label" x="739" y="283" text-anchor="middle">JSON result</text>
  <text class="small" x="739" y="303" text-anchor="middle">requested shape</text>

  <path class="arrow" d="M204 164 C224 135 241 108 261 103"/>
  <path class="arrow" d="M204 188 C224 217 241 244 261 249"/>
  <path class="arrow" d="M415 103 C450 107 493 124 525 140"/>
  <path class="arrow" d="M415 249 C450 245 493 228 525 211"/>
  <path class="arrow" d="M548 212 C548 225 548 237 548 249"/>
  <path class="arrow" d="M625 176 C638 176 654 176 667 176"/>
  <path class="arrow" d="M739 212 C739 225 739 237 739 249"/>
  <text class="note" x="339" y="326" text-anchor="middle">Hot path: no LLM after validation</text>
</svg>
